  </header>

  <main class="wrap">
    <h1>コマンド</h1>
    <p class="lead">SiriusBotでよく使う代表的なコマンドです。サーバー状況に応じて追加・変更される場合があります。</p>
    <section class="panel">
      <ul><li><strong>/help</strong> : 利用可能なコマンド一覧を表示します。</li><li><strong>/setup</strong> : 初期設定ウィザードを開始します。</li><li><strong>/warn @user 理由</strong> : メンバーへ警告を付与します。</li><li><strong>/music play 曲名</strong> : 音楽再生を開始します。</li><li><strong>/ticket open</strong> : サポートチケットを作成します。</li></ul><p class="notice">※ 管理系コマンドは権限を持つロールのみ実行できます。</p>
    </section>
  </main>

  <script src="./script.js"></script>
