    <h1>機能</h1>
    <p class="lead">SiriusBotが提供する主要機能の概要です。</p>
    <section class="panel">
      <ul><li><strong>モデレーション支援</strong> : 自動フィルター、荒らし対策、ログ記録。</li><li><strong>コミュニティ活性化</strong> : レベル機能、リアクションロール、歓迎メッセージ。</li><li><strong>通知連携</strong> : YouTube / Twitch / RSSの更新通知。</li><li><strong>運営効率化</strong> : 定期アナウンス、監査ログ出力、バックアップ補助。</li><li><strong>多言語対応</strong> : 日本語を中心に複数言語のUIを提供。</li></ul>
