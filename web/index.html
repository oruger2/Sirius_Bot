<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sirius // Dev Portal</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="scanlines">
  <div class="grid"></div>

  <main class="terminal">
    <div class="terminal-head">
      <div class="dots">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
      </div>
      <span id="server-label">root@bot-hosting:~/deploy/sirius-home</span>
    </div>

    <section class="terminal-body">
      <div class="line" data-run="1"><span class="prompt">$</span><span class="cmd">npm run deploy --target bot-hosting.net</span></div>
      <div class="line" data-run="2"><span class="prompt">$</span><span class="cmd">status</span> <span class="value">ONLINE // 200 OK</span></div>
      <div class="line" data-run="3"><span class="prompt">$</span><span class="cmd">echo</span> <span class="value">"Welcome, builder."</span></div>

      <article class="hero">
        <h1>Sirius Developer Portal</h1>
        <p class="subtitle">ゴリゴリの開発者向け、ネオン×ターミナル系アニメーションホームページ。</p>
        <div class="buttons">
          <a class="btn primary" href="#">Get Started</a>
          <a class="btn" href="#">Docs</a>
          <a class="btn" href="#">Status</a>
        </div>
      </article>
    </section>

    <div class="float-chip">BUILD: STABLE</div>
  </main>

  <script src="./script.js"></script>
</body>
</html>
